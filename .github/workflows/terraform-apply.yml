name: Terraform Apply

on:
  push:
    branches: [master]
    paths:
      - "infra/**"
      - "function/**"

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: ${{ vars.TF_VAR_AWS_REGION }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: function/pnpm-lock.yaml

      - name: Build Lambda function
        working-directory: function
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
          TF_VAR_from_email: ${{ vars.TF_VAR_FROM_EMAIL }}
          TF_VAR_owner_email: ${{ vars.TF_VAR_OWNER_EMAIL }}

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Terraform apply failed! Check the logs."
