<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/></head>
<body style="margin:0;padding:0;background-color:rgb(10,10,10);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:rgb(10,10,10);padding:40px 20px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">

        <!-- Header — liquid glass pill -->
        <tr><td style="padding-bottom:32px;text-align:center;">
          <table cellpadding="0" cellspacing="0" border="0" align="center" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:9999px;box-shadow:inset 0 1px 5px rgba(255,255,255,0.12),0 20px 25px -5px rgba(0,0,0,0.4);">
            <tr><td style="padding:16px 32px;">
              <p style="margin:0;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgb(48,205,226);font-weight:600;">Portfolio · beto-najera.com</p>
              <h1 style="margin:6px 0 0;font-size:20px;font-weight:700;color:#ffffff;">📬 Nuevo mensaje de contacto</h1>
            </td></tr>
          </table>
        </td></tr>

        <!-- Card — liquid glass with inner blobs -->
        <tr><td style="background-color:rgba(255,255,255,0.05);background-image:radial-gradient(circle at 88% 8%,rgba(219,40,121,0.3) 0%,rgba(156,32,187,0.18) 15%,transparent 30%),radial-gradient(circle at 12% 90%,rgba(48,205,226,0.25) 0%,rgba(92,127,241,0.15) 15%,transparent 30%);border:1px solid rgba(255,255,255,0.14);border-radius:24px;padding:32px;box-shadow:inset 0 1px 5px rgba(255,255,255,0.1),0 20px 25px -5px rgba(0,0,0,0.5),0 10px 10px -5px rgba(0,0,0,0.2);">

          <!-- Name -->
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
            <tr><td style="padding-bottom:6px;">
              <p style="margin:0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:600;">Nombre</p>
            </td></tr>
            <tr><td style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);border-radius:12px;padding:12px 16px;box-shadow:inset 0 1px 3px rgba(255,255,255,0.08);">
              <p style="margin:0;font-size:15px;color:#ffffff;font-weight:500;">{{name}}</p>
            </td></tr>
          </table>

          <!-- Email -->
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
            <tr><td style="padding-bottom:6px;">
              <p style="margin:0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:600;">Email</p>
            </td></tr>
            <tr><td style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);border-radius:12px;padding:12px 16px;box-shadow:inset 0 1px 3px rgba(255,255,255,0.08);">
              <a href="mailto:{{email}}" style="font-size:15px;color:rgb(48,205,226);font-weight:500;text-decoration:none;">{{email}}</a>
            </td></tr>
          </table>

          <!-- Message -->
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
            <tr><td style="padding-bottom:6px;">
              <p style="margin:0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:600;">Mensaje</p>
            </td></tr>
            <tr><td style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);border-radius:12px;padding:16px;box-shadow:inset 0 1px 3px rgba(255,255,255,0.08);">
              <p style="margin:0;font-size:15px;color:rgb(220,220,220);line-height:1.7;white-space:pre-wrap;">{{message}}</p>
            </td></tr>
          </table>

          <!-- Reply CTA — liquid glass button -->
          <table width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr><td align="center">
              <a href="mailto:{{email}}" style="display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22);border-radius:9999px;padding:13px 32px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;box-shadow:inset 0 1px 5px rgba(255,255,255,0.12),0 0 20px rgba(48,205,226,0.15),0 10px 20px rgba(0,0,0,0.3);letter-spacing:0.3px;">
                Responder a {{name}} →
              </a>
            </td></tr>
          </table>

        </td></tr>

        <!-- Footer -->
        <tr><td style="padding-top:24px;text-align:center;">
          <p style="margin:0;font-size:12px;color:rgb(60,60,60);">Enviado desde <a href="https://beto-najera.com" style="color:rgb(48,205,226);text-decoration:none;">beto-najera.com</a></p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
